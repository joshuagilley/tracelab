name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: projects-491501
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  REPO: tracelab

jobs:
  # ── 1. Build and deploy the Go API ─────────────────────────────
  deploy-api:
    name: API → Cloud Run
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.service-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker to push to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push API image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          docker build -t "$IMAGE" ./services/api
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy tracelab-api \
            --image "${{ env.IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: Get API service URL
        id: service-url
        run: |
          URL=$(gcloud run services describe tracelab-api \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "API live at: $URL"

  # ── 2. Build and deploy the React frontend ─────────────────────
  # Runs after API so we can bake the real API URL into the build.
  deploy-web:
    name: Web → Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker to push to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Web image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/web:${{ github.sha }}"
          docker build \
            --build-arg VITE_API_BASE="${{ needs.deploy-api.outputs.url }}" \
            -t "$IMAGE" \
            ./apps/web
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy tracelab-web \
            --image "${{ env.IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: Summary
        run: |
          URL=$(gcloud run services describe tracelab-web \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "### 🚀 TraceLab deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Web     | $URL |" >> $GITHUB_STEP_SUMMARY
          echo "| API     | ${{ needs.deploy-api.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "TraceLab live at: $URL"
