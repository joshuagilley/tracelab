name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: projects-491501
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  REPO: tracelab
  # Cloud Run direct VPC egress — required for API → Mongo via NAT (--vpc-egress all-traffic).
  # Subnet must be a regional subnet in the same region as Cloud Run. Adjust names if yours differ.
  VPC_NETWORK: tracelab-vpc
  VPC_SUBNET: tracelab-subnet

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod

      - name: Go tests
        run: go test ./...
        working-directory: services/api

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Web build
        run: npm ci && npm run build
        working-directory: apps/web

  # ── Go API (embedded static lessons only) ───────────────────────────────
  deploy-api:
    name: API → Cloud Run
    needs: test
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.service-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker to push to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push API image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          docker build -f services/api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy tracelab-api \
            --image "${{ env.IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --network ${{ env.VPC_NETWORK }} \
            --subnet ${{ env.VPC_SUBNET }} \
            --vpc-egress all-traffic \
            --quiet

      - name: Get API service URL
        id: service-url
        run: |
          URL=$(gcloud run services describe tracelab-api \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "API live at: $URL"

  # ── React frontend ────────────────────────────────────────────────
  deploy-web:
    name: Web → Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker to push to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Web image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/web:${{ github.sha }}"
          docker build \
            --build-arg VITE_API_BASE="${{ needs.deploy-api.outputs.url }}" \
            -t "$IMAGE" \
            ./apps/web
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy tracelab-web \
            --image "${{ env.IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --network ${{ env.VPC_NETWORK }} \
            --subnet ${{ env.VPC_SUBNET }} \
            --vpc-egress all-traffic \
            --quiet

      - name: Summary
        run: |
          URL=$(gcloud run services describe tracelab-web \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "### 🚀 TraceLab deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Web     | $URL |" >> $GITHUB_STEP_SUMMARY
          echo "| API     | ${{ needs.deploy-api.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "TraceLab live at: $URL"
